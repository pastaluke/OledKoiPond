<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>OLED Koi Pond</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: #000000;
    }

    /* Hidden Canvas2D render target — kept in-layout so clientWidth/clientHeight
       remain valid for grid.resize(); invisible and non-interactive. */
    canvas#pond {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      pointer-events: none;
    }

    /* Visible WebGL output canvas. */
    canvas#webgl {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    canvas#debug {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    /* ── Hamburger button ───────────────────────────────────────────────────── */
    #menu-btn {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 200;
      width: 32px;
      height: 32px;
      padding: 0;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: opacity 0.7s ease;
    }

    #menu-btn.faded {
      opacity: 0;
    }

    #menu-btn span {
      display: block;
      width: 15px;
      height: 2px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 1px;
    }

    #menu-btn:hover {
      background: rgba(30, 30, 30, 0.8);
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* ── Floating panel ─────────────────────────────────────────────────────── */
    #menu-panel {
      position: fixed;
      top: 48px;
      right: 8px;
      z-index: 200;
      /* Width sizes to its content (so rows aren't cut off / no left-right scroll),
         floored at the old 210px and capped to the viewport. */
      width: max-content;
      min-width: 210px;
      max-width: min(340px, calc(100vw - 16px));
      /* Cap to the viewport (8px gap top + bottom) and scroll when taller, so a fully
         expanded menu can always be scrolled to the bottom. */
      max-height: calc(100vh - 56px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      background: rgba(8, 8, 8, 0.93);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: ui-monospace, 'Cascadia Code', 'SF Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      user-select: none;
    }

    /* collapsible Debug section */
    #menu-panel details > summary {
      list-style: none;
      cursor: pointer;
      padding: 2px 0 4px;
      color: rgba(255, 255, 255, 0.38);
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #menu-panel details > summary::-webkit-details-marker { display: none; }
    #menu-panel details > summary::before {
      content: '▶ ';
      font-size: 7px;
      vertical-align: 1px;
    }
    #menu-panel details[open] > summary::before { content: '▼ '; }

    /* rows inside a section */
    .menu-rows {
      padding: 2px 0 2px 2px;
    }

    .menu-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      cursor: pointer;
      gap: 8px;
    }

    /* pill toggle switch */
    .menu-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      flex-shrink: 0;
      width: 26px;
      height: 14px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 7px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s;
    }

    .menu-row input[type="checkbox"]::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.15s, background 0.15s;
    }

    .menu-row input[type="checkbox"]:checked {
      background: rgba(0, 200, 255, 0.35);
    }

    .menu-row input[type="checkbox"]:checked::after {
      transform: translateX(12px);
      background: rgb(0, 210, 255);
    }

    /* full-width action button (e.g. Fullscreen) */
    button.menu-action {
      width: 100%;
      padding: 5px 0;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.7);
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      touch-action: manipulation;
      text-align: center;
      margin-bottom: 6px;
    }

    button.menu-action:active {
      background: rgba(255, 255, 255, 0.14);
    }

    /* ── Movement tuning sliders ─────────────────────────────────────────────── */
    .menu-scroll {
      max-height: 58vh;
      overflow-y: auto;
      padding-right: 2px;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .slider-row:last-child { border-bottom: none; }

    .slider-val {
      color: rgb(0, 210, 255);
      font-variant-numeric: tabular-nums;
    }

    /* button trios (− [ +, − ] +, − o +) */
    .bound-controls {
      display: flex;
      gap: 10px;
    }

    .value-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .value-controls .slider-label { flex: 1; min-width: 0; }

    .btn-group {
      display: inline-flex;
      align-items: stretch;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 5px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .step-btn {
      appearance: none;
      -webkit-appearance: none;
      min-width: 18px;
      height: 16px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }
    .step-btn:hover  { background: rgba(0, 210, 255, 0.18); color: #fff; }
    .step-btn:active { background: rgba(0, 210, 255, 0.34); }

    .bound-mid, .knob-mid {
      min-width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-left: 1px solid rgba(255, 255, 255, 0.12);
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.5);
      font-family: ui-monospace, monospace;
      font-size: 11px;
    }
    .bound-mid { cursor: pointer; padding: 0; }
    .bound-mid:hover { color: rgb(0, 210, 255); }
    .knob-mid::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgb(0, 210, 255);
    }

    .slider-track {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .range-end {
      font-size: 8.5px;
      color: rgba(255, 255, 255, 0.4);
      font-variant-numeric: tabular-nums;
      min-width: 26px;
      flex-shrink: 0;
    }
    .range-min { text-align: right; }
    .range-max { text-align: left; }

    .slider-row input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      flex: 1;
      width: auto;
      height: 3px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 2px;
      cursor: pointer;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgb(0, 210, 255);
      cursor: pointer;
    }

    .slider-row input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border: none;
      border-radius: 50%;
      background: rgb(0, 210, 255);
      cursor: pointer;
    }

    /* clickable (i) info icon next to a slider label */
    .slider-label {
      display: inline-flex;
      align-items: center;
    }

    .info-icon {
      appearance: none;
      -webkit-appearance: none;
      margin-left: 5px;
      width: 12px;
      height: 12px;
      padding: 0;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 9px;
      line-height: 10px;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
    }

    .info-icon:hover {
      color: rgb(0, 210, 255);
      border-color: rgba(0, 210, 255, 0.6);
    }

    /* click-to-show description popup (anchored within the panel) */
    #info-pop {
      position: absolute;
      z-index: 10;
      max-width: 150px;
      padding: 6px 8px;
      background: rgba(20, 20, 20, 0.97);
      border: 1px solid rgba(0, 210, 255, 0.4);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 10px;
      line-height: 1.35;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    /* side-by-side action buttons (Copy / Reset) */
    .menu-btn-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .menu-btn-row .menu-action {
      flex: 1;
      margin-bottom: 0;
    }

    .menu-select {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 11px;
      padding: 2px 6px;
      cursor: pointer;
      max-width: 110px;
    }
    .menu-select option {
      background: #1a1a1a;
      color: rgba(255,255,255,0.8);
    }

    /* ── Palette editor ──────────────────────────────────────────────────────── */
    .pal-editor { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
    .pal-color-list { display: flex; flex-direction: column; gap: 3px; }
    .pal-color-row {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 0;
    }
    .pal-swatch {
      flex-shrink: 0; width: 12px; height: 12px; border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .pal-rgb-text { flex: 1; font-size: 11px; color: rgba(255,255,255,0.55); }
    .pal-del-color {
      appearance: none; -webkit-appearance: none;
      padding: 0 6px; line-height: 18px; font-size: 14px;
      background: none; border: none; color: rgba(255,60,60,0.65); cursor: pointer;
      flex-shrink: 0;
    }
    .pal-del-color:hover { color: rgba(255,80,80,1); }
    .pal-add-row { display: flex; gap: 4px; align-items: center; }
    .menu-text-input {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
      color: rgba(255,255,255,0.8); font-family: inherit; font-size: 11px;
      padding: 3px 6px; min-width: 0;
    }
    .pal-icon-btn {
      flex-shrink: 0; padding: 2px 6px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7); cursor: pointer; font-size: 12px;
      line-height: 18px;
    }
    .pal-icon-btn:active { background: rgba(255,255,255,0.14); }

    /* ── Shape editor ────────────────────────────────────────────────────────── */
    .shape-preview {
      display: block;
      width: 100%;
      height: 60px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      margin-bottom: 4px;
    }

    /* ── Specular ring blocks ────────────────────────────────────────────────── */
    .spec-rings { margin-top: 2px; }
    .spec-ring-block {
      border-left: 2px solid rgba(0,210,255,0.2);
      padding-left: 8px;
      margin: 6px 0 2px;
    }
    .spec-ring-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 9.5px;
      color: rgba(0,210,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 0 1px;
    }
    .spec-ring-del {
      appearance: none;
      -webkit-appearance: none;
      padding: 0 5px;
      line-height: 16px;
      font-size: 14px;
      background: none;
      border: none;
      color: rgba(255,60,60,0.65);
      cursor: pointer;
    }
    .spec-ring-del:hover { color: rgba(255,80,80,1); }

    /* ── Keyboard / TV-remote focus ring (E9) ───────────────────────────────── */
    #menu-panel :focus-visible {
      outline: 2px solid rgb(0, 210, 255);
      outline-offset: 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <canvas id="pond"></canvas>
  <canvas id="webgl" role="application" aria-label="Koi pond — arrow keys move cursor, Space/Enter interact, Escape releases"></canvas>
  <canvas id="debug"></canvas>
  <div id="aria-live" role="status" aria-live="polite" aria-atomic="true"
       style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
