<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SprintBoard — OledKoiPond</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: rgba(255,255,255,0.8);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0a0a0a;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .filter-btn {
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.75); }
    .filter-btn.active {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.25);
    }

    .sep { width: 1px; height: 16px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

    .action-btn {
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .action-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }

    /* ── Board ── */
    #board {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      overflow-x: auto;
      align-items: flex-start;
      min-height: calc(100vh - 78px);
    }

    /* ── Columns ── */
    details.column {
      flex: 0 0 215px;
      min-width: 215px;
      background: #111;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.055);
    }

    details.column > summary {
      list-style: none;
      padding: 9px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.055);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      user-select: none;
    }
    details.column > summary::-webkit-details-marker { display: none; }

    .col-title {
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      flex: 1;
    }

    .col-count {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.055);
      padding: 1px 6px;
      border-radius: 8px;
      min-width: 20px;
      text-align: center;
    }

    .col-body {
      min-height: 50px;
      padding: 7px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .col-body.drag-over { background: rgba(255,255,255,0.025); }

    /* ── Cards ── */
    .card {
      background: #161616;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.065);
      overflow: hidden;
      cursor: grab;
      transition: border-color 0.12s, transform 0.1s;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .card.dragging { opacity: 0.35; cursor: grabbing; }

    .card-banner { height: 3px; }

    .card-body { padding: 7px 9px; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }
    .card-epic {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .card-id {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-left: auto;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Doc-level marker on cards ── */
    .card-doc {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      color: rgba(255,255,255,0.4);
      cursor: help;
      transition: color 0.12s;
    }
    .card-epic + .card-doc { margin-left: auto; }  /* first badge pushes the cluster right */
    .card-doc + .card-id { margin-left: 5px; }     /* id sits just after the last icon */
    .card:hover .card-doc { color: rgba(255,255,255,0.7); }
    .card-doc svg { display: block; }

    /* ── Doc-marker legend in header ── */
    .doc-legend {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.4);
      font-size: 10px;
    }
    .doc-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      cursor: help;
    }
    .doc-legend-item svg { display: block; }
    .doc-legend-label { color: rgba(255,255,255,0.35); letter-spacing: 0.2px; }

    .card-title {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.82);
      line-height: 1.4;
      margin-bottom: 5px;
    }

    .card-sprint {
      display: inline-block;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.055);
      color: rgba(255,255,255,0.35);
      margin-bottom: 5px;
    }

    .card-notes {
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      line-height: 1.45;
    }
    /* Collapsed cards clamp the note to 2 lines so the board stays a scanner */
    .card:not(.expanded) .card-notes {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Expand toggle ── */
    .card-expand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      margin-top: 6px;
      padding: 3px 0 1px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: transparent;
      color: rgba(255,255,255,0.3);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: color 0.12s;
    }
    .card-expand:hover { color: rgba(255,255,255,0.6); }
    .card-expand .chev { font-size: 9px; transition: transform 0.15s; }
    .card.expanded .card-expand .chev { transform: rotate(180deg); }
    .card.expanded .card-expand .lbl-more::after { content: 'Less'; }
    .card:not(.expanded) .card-expand .lbl-more::after { content: 'Details'; }

    /* ── Expanded detail panel ── */
    .card-detail {
      display: none;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
      line-height: 1.5;
      color: rgba(255,255,255,0.5);
    }
    .card.expanded .card-detail { display: block; }
    .card-detail .fld { margin-bottom: 6px; }
    .card-detail .fld:last-child { margin-bottom: 0; }
    .card-detail .k {
      display: block;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 1px;
    }
    .card-detail .dates { display: flex; flex-wrap: wrap; gap: 2px 14px; color: rgba(255,255,255,0.4); }
    .card-detail ul { margin: 0; padding-left: 15px; }
    .card-detail li { margin-bottom: 1px; }
    .card-detail li.bug { color: rgba(255,150,150,0.72); }

    .card.hidden { display: none; }

    /* ── Desktop: columns always open, non-interactive summary ── */
    @media (min-width: 641px) {
      details.column > summary { pointer-events: none; cursor: default; }
    }

    /* ── Mobile: stack columns vertically ── */
    @media (max-width: 640px) {
      #board {
        flex-direction: column;
        overflow-x: visible;
        padding: 10px 12px;
        gap: 8px;
      }
      details.column {
        flex: none;
        min-width: 0;
        width: 100%;
      }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(28,28,28,0.97);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.85);
      padding: 7px 14px;
      border-radius: 5px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

// ── Doc-level markers ──────────────────────────────────────────────
// Two INDEPENDENT flags describe a ticket's documentation footprint:
//
//   `doc` (1 | 2 | 3) — how much planning/design exists beyond the board note.
//     A mutually-exclusive progression. Optional `docRef` names the source file
//     and shows in the hover tooltip.
//       1 · single page      documented elsewhere; minimal planning (no epic)
//       2 · stack of docs    implementation details exist (in an epic); not started
//       3 · stack + plus     highly detailed implementation design —
//                            added to the project knowledge graph
//
//   `media` (true | "label") — set when media / special file types are attached
//     (art, audio, diagrams, narrative docs beyond a plain .md). Renders its own
//     icon NEXT TO the doc icon; the two are non-exclusive. A string value is
//     shown in the tooltip.
const DOC_ICONS = {
  1: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 3H7a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8.5z"/><path d="M13.5 3v5.5H19"/><path d="M9 13h6M9 16.5h5"/></svg>',
  2: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5V4.5a1.4 1.4 0 0 1 1.4-1.4H13"/><path d="M6.5 16V7a1.4 1.4 0 0 1 1.4-1.4H16"/><rect x="9" y="9" width="11" height="12" rx="1.5"/></svg>',

};
const DOC_TITLES = {
  1: 'Lightly documented — referenced in a shared doc (GDD / TASKS); no dedicated design doc',
  2: 'Has a dedicated design / implementation doc',
  3: 'Highly detailed design — added to the knowledge graph',
};
const MEDIA_ICON = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="3.5" width="12" height="17" rx="2"/><circle cx="9.8" cy="8" r="1.5"/><path d="M6.6 16.2l3.3-3.4 2.3 2 2.7-2.9 2.5 2.7"/></svg>';
const MEDIA_TITLE = 'Media / special files attached (art, audio, diagrams, narrative docs)';

function docBadge(t) {
  let out = '';
  if (DOC_ICONS[t.doc]) {
    const title = DOC_TITLES[t.doc] + (t.docRef ? ' · ' + t.docRef : '');
    out += `<span class="card-doc" title="${escHtml(title)}" aria-label="${escHtml(DOC_TITLES[t.doc])}">${DOC_ICONS[t.doc]}</span>`;
  }
  if (t.media) {
    const title = MEDIA_TITLE + (typeof t.media === 'string' ? ' · ' + t.media : '');
    out += `<span class="card-doc card-media" title="${escHtml(title)}" aria-label="${escHtml(MEDIA_TITLE)}">${MEDIA_ICON}</span>`;
  }
  return out;
}

// ── Expanded ticket detail ──────────────────────────────────────────
// All fields optional; only present ones render. `open`/`bugs` accept a
// string or an array of strings.
function listHtml(v, cls) {
  const arr = Array.isArray(v) ? v : [v];
  return `<ul>${arr.map(x => `<li${cls ? ` class="${cls}"` : ''}>${escHtml(x)}</li>`).join('')}</ul>`;
}

function cardDetail(t) {
  let out = '';
  if (t.desc) out += `<div class="fld"><span class="k">Description</span>${escHtml(t.desc)}</div>`;

  const dates = [];
  if (t.created) dates.push(`Created ${escHtml(t.created)}`);
  if (t.started) dates.push(`Started ${escHtml(t.started)}`);
  if (t.ended)   dates.push(`Ended ${escHtml(t.ended)}`);
  if (dates.length) out += `<div class="fld dates">${dates.map(d => `<span>${d}</span>`).join('')}</div>`;

  if (t.tech) out += `<div class="fld"><span class="k">Technical summary</span>${escHtml(t.tech)}</div>`;
  if (t.open && t.open.length) out += `<div class="fld"><span class="k">Open questions</span>${listHtml(t.open)}</div>`;
  if (t.bugs && t.bugs.length) out += `<div class="fld"><span class="k">Known bugs / issues</span>${listHtml(t.bugs, 'bug')}</div>`;

  return out ? `<div class="card-detail">${out}</div>` : '';
}

let tickets = [];
let activeEpic = 'all';

function load() {
  const saved = localStorage.getItem('koipond.board');
  tickets = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(BAKED_DATA));
}

function persist() {
  localStorage.setItem('koipond.board', JSON.stringify(tickets));
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function makeCard(t) {
  const color  = EPIC_COLORS[t.epic] || '#666';
  const hidden = activeEpic !== 'all' && t.epic !== activeEpic;

  const card = document.createElement('div');
  card.className = 'card' + (hidden ? ' hidden' : '');
  card.draggable = true;
  card.dataset.id = t.id;

  const detailHtml = cardDetail(t);
  const notesLong  = !!t.notes && t.notes.length > 90;   // roughly > 2 clamped lines
  const expandable = !!detailHtml || notesLong;

  card.innerHTML =
    `<div class="card-banner" style="background:${color}"></div>` +
    `<div class="card-body">` +
      `<div class="card-meta">` +
        `<span class="card-epic" style="color:${color}">${escHtml(t.epic)} · ${escHtml(EPIC_NAMES[t.epic] || '')}</span>` +
        docBadge(t) +
        `<span class="card-id">${escHtml(t.id)}</span>` +
      `</div>` +
      `<div class="card-title">${escHtml(t.title)}</div>` +
      (t.sprint ? `<span class="card-sprint">${escHtml(t.sprint)}</span>` : '') +
      (t.notes  ? `<div class="card-notes">${escHtml(t.notes)}</div>`   : '') +
      detailHtml +
      (expandable ? `<button class="card-expand" type="button" draggable="false"><span class="lbl-more"></span><span class="chev">▾</span></button>` : '') +
    `</div>`;

  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', t.id);
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  const expandBtn = card.querySelector('.card-expand');
  if (expandBtn) {
    expandBtn.addEventListener('click', e => {
      e.stopPropagation();
      card.classList.toggle('expanded');
    });
  }
  return card;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (const col of COLUMNS) {
    const colTickets = tickets.filter(t => t.status === col.id);
    const visCount = activeEpic === 'all'
      ? colTickets.length
      : colTickets.filter(t => t.epic === activeEpic).length;

    const details = document.createElement('details');
    details.className = 'column';
    details.setAttribute('open', '');
    details.dataset.colId = col.id;

    const summary = document.createElement('summary');
    summary.innerHTML =
      `<span class="col-title">${col.emoji} ${col.label}</span>` +
      `<span class="col-count">${visCount}</span>`;

    const body = document.createElement('div');
    body.className = 'col-body';

    for (const t of colTickets) body.appendChild(makeCard(t));

    body.addEventListener('dragover',  e => { e.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', ()  => body.classList.remove('drag-over'));
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const ticket = tickets.find(t => t.id === id);
      if (ticket && ticket.status !== col.id) {
        ticket.status = col.id;
        persist();
        renderBoard();
      }
    });

    details.appendChild(summary);
    details.appendChild(body);
    board.appendChild(details);
  }
}

// Epic filter
document.getElementById('controls').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeEpic = btn.dataset.epic;
  document.querySelectorAll('.filter-btn')
    .forEach(b => b.classList.toggle('active', b === btn));
  renderBoard();
});

// Copy JSON
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(JSON.stringify(tickets, null, 2))
    .then(() => showToast('JSON copied — paste between the BEGIN_TICKETS / END_TICKETS markers in SprintBoard.html'))
    .catch(() => showToast('Copy failed — check browser permissions'));
});

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset to baked-in data? All drag changes will be lost.')) return;
  localStorage.removeItem('koipond.board');
  load();
  renderBoard();
});

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 2800);
}

function renderLegend() {
  const el = document.getElementById('doc-legend');
  if (!el) return;
  const labels = { 1: 'min', 2: 'spec', 3: 'in graph' };
  el.innerHTML = '<span class="doc-legend-label" style="letter-spacing:0.4px">DOCS</span>' +
    [1, 2, 3].map(lvl =>
      `<span class="doc-legend-item" title="${escHtml(DOC_TITLES[lvl])}">` +
        DOC_ICONS[lvl] +
        `<span class="doc-legend-label">${labels[lvl]}</span>` +
      `</span>`
    ).join('') +
    `<span class="doc-legend-item" title="${escHtml(MEDIA_TITLE)}">` +
      MEDIA_ICON +
      `<span class="doc-legend-label">media</span>` +
    `</span>`;
}

load();
renderLegend();
renderBoard();
</script>
</body>
</html>
