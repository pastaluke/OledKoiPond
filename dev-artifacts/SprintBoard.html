<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SprintBoard — OledKoiPond</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: rgba(255,255,255,0.8);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0a0a0a;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .filter-btn {
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.75); }
    .filter-btn.active {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.25);
    }

    .sep { width: 1px; height: 16px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

    .action-btn {
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .action-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }

    /* ── Board ── */
    #board {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      overflow-x: auto;
      align-items: flex-start;
      min-height: calc(100vh - 78px);
    }

    /* ── Columns ── */
    details.column {
      flex: 0 0 215px;
      min-width: 215px;
      background: #111;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.055);
    }

    details.column > summary {
      list-style: none;
      padding: 9px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.055);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      user-select: none;
    }
    details.column > summary::-webkit-details-marker { display: none; }

    .col-title {
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      flex: 1;
    }

    .col-count {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.055);
      padding: 1px 6px;
      border-radius: 8px;
      min-width: 20px;
      text-align: center;
    }

    .col-body {
      min-height: 50px;
      padding: 7px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .col-body.drag-over { background: rgba(255,255,255,0.025); }

    /* ── Cards ── */
    .card {
      background: #161616;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.065);
      overflow: hidden;
      cursor: grab;
      transition: border-color 0.12s, transform 0.1s;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .card.dragging { opacity: 0.35; cursor: grabbing; }

    .card-banner { height: 3px; }

    .card-body { padding: 7px 9px; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }
    .card-epic {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .card-id {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-left: auto;
    }

    .card-title {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.82);
      line-height: 1.4;
      margin-bottom: 5px;
    }

    .card-sprint {
      display: inline-block;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.055);
      color: rgba(255,255,255,0.35);
      margin-bottom: 5px;
    }

    .card-notes {
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      line-height: 1.45;
    }

    .card.hidden { display: none; }

    /* ── Desktop: columns always open, non-interactive summary ── */
    @media (min-width: 641px) {
      details.column > summary { pointer-events: none; cursor: default; }
    }

    /* ── Mobile: stack columns vertically ── */
    @media (max-width: 640px) {
      #board {
        flex-direction: column;
        overflow-x: visible;
        padding: 10px 12px;
        gap: 8px;
      }
      details.column {
        flex: none;
        min-width: 0;
        width: 100%;
      }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(28,28,28,0.97);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.85);
      padding: 7px 14px;
      border-radius: 5px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

const COLUMNS = [
  { id: 'idea-pond',        label: 'Idea Pond',         emoji: '💡' },
  { id: 'backlog',          label: 'Backlog',            emoji: '⬜' },
  { id: 'ready-for-design', label: 'Ready for Design',  emoji: '🟦' },
  { id: 'implementation',   label: 'Implementation',    emoji: '🔶' },
  { id: 'testing',          label: 'Testing',            emoji: '🧪' },
  { id: 'live',             label: 'Live',               emoji: '✅' },
];

const EPIC_COLORS = {
  E1: '#00d2ff', E2: '#4488ff', E3: '#aa66ff',
  E4: '#44cc88', E5: '#ff9944', E6: '#ff5599',
};

const EPIC_NAMES = {
  E1: 'Core Polish',       E2: 'Water & Interaction',
  E3: 'Visual System',     E4: 'Entity Ecosystem',
  E5: 'Deployment',        E6: 'Creator Workshop',
};

let tickets = [];
let activeEpic = 'all';

function load() {
  const saved = localStorage.getItem('koipond.board');
  tickets = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(BAKED_DATA));
}

function persist() {
  localStorage.setItem('koipond.board', JSON.stringify(tickets));
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function makeCard(t) {
  const color  = EPIC_COLORS[t.epic] || '#666';
  const hidden = activeEpic !== 'all' && t.epic !== activeEpic;

  const card = document.createElement('div');
  card.className = 'card' + (hidden ? ' hidden' : '');
  card.draggable = true;
  card.dataset.id = t.id;

  card.innerHTML =
    `<div class="card-banner" style="background:${color}"></div>` +
    `<div class="card-body">` +
      `<div class="card-meta">` +
        `<span class="card-epic" style="color:${color}">${escHtml(t.epic)} · ${escHtml(EPIC_NAMES[t.epic] || '')}</span>` +
        `<span class="card-id">${escHtml(t.id)}</span>` +
      `</div>` +
      `<div class="card-title">${escHtml(t.title)}</div>` +
      (t.sprint ? `<span class="card-sprint">${escHtml(t.sprint)}</span>` : '') +
      (t.notes  ? `<div class="card-notes">${escHtml(t.notes)}</div>`   : '') +
    `</div>`;

  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', t.id);
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  return card;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (const col of COLUMNS) {
    const colTickets = tickets.filter(t => t.status === col.id);
    const visCount = activeEpic === 'all'
      ? colTickets.length
      : colTickets.filter(t => t.epic === activeEpic).length;

    const details = document.createElement('details');
    details.className = 'column';
    details.setAttribute('open', '');
    details.dataset.colId = col.id;

    const summary = document.createElement('summary');
    summary.innerHTML =
      `<span class="col-title">${col.emoji} ${col.label}</span>` +
      `<span class="col-count">${visCount}</span>`;

    const body = document.createElement('div');
    body.className = 'col-body';

    for (const t of colTickets) body.appendChild(makeCard(t));

    body.addEventListener('dragover',  e => { e.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', ()  => body.classList.remove('drag-over'));
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const ticket = tickets.find(t => t.id === id);
      if (ticket && ticket.status !== col.id) {
        ticket.status = col.id;
        persist();
        renderBoard();
      }
    });

    details.appendChild(summary);
    details.appendChild(body);
    board.appendChild(details);
  }
}

// Epic filter
document.getElementById('controls').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeEpic = btn.dataset.epic;
  document.querySelectorAll('.filter-btn')
    .forEach(b => b.classList.toggle('active', b === btn));
  renderBoard();
});

// Copy JSON
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(JSON.stringify(tickets, null, 2))
    .then(() => showToast('JSON copied — paste into tickets.json, then run build-board.js'))
    .catch(() => showToast('Copy failed — check browser permissions'));
});

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset to baked-in data? All drag changes will be lost.')) return;
  localStorage.removeItem('koipond.board');
  load();
  renderBoard();
});

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 2800);
}

load();
